<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<h2>Notice to <span th:text="${firstName}">User</span>,</h2>
<p>There was a failed attempt to login to your account (<strong th:text="${username}">username</strong>) at <th:block th:text="${#temporals.format(eventTimestamp, 'yyyy-MM-dd HH:mm:ss z')}"></th:block>.</p>
<p th:if="${ipAddress != null}">Attempted IP Address: <span th:text="${ipAddress}">ip</span></p>
<p>If you forgot your password, please use the password reset feature.</p>
</body>
</html>
