<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Login Failure Notification</title>
</head>
<body>
<h2>Notice to <span th:text="${firstName ?: 'User'}">User</span>,</h2>
<p>There was a failed attempt to login to your account (<strong th:text="${username}">username</strong>)<th:block th:if="${eventTimestamp != null}"> at <th:block th:text="${#temporals.format(eventTimestamp, 'yyyy-MM-dd HH:mm:ss z')}"></th:block></th:block>.</p>
<p th:if="${ipAddress != null}">Attempted IP Address: <span th:text="${ipAddress}">ip</span></p>
<p>If you did not attempt this login, please change your password immediately and contact support. If you forgot your password, please use the password reset feature.</p>
</body>
</html>
