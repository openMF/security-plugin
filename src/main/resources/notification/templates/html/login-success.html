<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Success Notification</title>
</head>
<body>
<h2>Hello <span th:text="${firstName ?: 'there'}">User</span>,</h2>
<p>We detected a new login to your account<th:block th:if="${eventTimestamp != null}"> at <th:block th:text="${#temporals.format(eventTimestamp, 'yyyy-MM-dd HH:mm:ss z')}"></th:block></th:block>.</p>
<p th:if="${ipAddress != null}">IP Address: <span th:text="${ipAddress}">ip</span></p>
<p>If this was you, you can safely ignore this email. If not, please contact support immediately.</p>
</body>
</html>
